# docker-compose.yml — local dev + production parity
# Run: docker compose up -d

version: '3.9'

services:

  # ── PostgreSQL 16 ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pharmpro_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pharmpro
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       pharmpro_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U pharmpro -d pharmpro_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis 7 ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pharmpro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redissecret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "redissecret", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── API (Node.js) ──────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
    container_name: pharmpro_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:           postgresql://pharmpro:secret@postgres:5432/pharmpro_db
      REDIS_URL:              redis://:redissecret@redis:6379
      NODE_ENV:               production
      PORT:                   4000
      API_URL:                http://localhost:4000
      CLIENT_URL:             http://localhost:5173
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN:  15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS:          12
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # ── Nginx reverse proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pharmpro_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  pg_data:
  redis_data:

